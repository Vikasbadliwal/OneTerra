[defaults]
roles_path = ./ansible/roles
inventory = ./ansible/aws_ec2.yml
host_key_checking = False
remote_user = ubuntu

[ssh_connection]
# This is the magic command that builds the tunnel
ssh_args = -o ProxyCommand="ssh -W %h:%p -q ubuntu@<YOUR_BASTION_PUBLIC_IP> -i <PATH_TO_YOUR_KEY>.pem -o StrictHostKeyChecking=no"
pipelining = True
